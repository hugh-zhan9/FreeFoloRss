services:
  rsshub:
    image: ${RSSHUB_IMAGE:-diygod/rsshub:latest}
    container_name: rsshub
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "${RSSHUB_PORT:-1200}:1200"
    environment:
      NODE_ENV: production
      PORT: 1200
      REDIS_URL: redis://redis:6379/0
      CACHE_TYPE: redis
      CACHE_EXPIRE: ${CACHE_EXPIRE:-300}
      ACCESS_KEY: ${RSSHUB_ACCESS_KEY:-}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:1200/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: rsshub-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - rsshub_redis_data:/data

volumes:
  rsshub_redis_data:
